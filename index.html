<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="calculadora" id="calculadora">
      <div class="tela" id="tela"></div>
      <div class="buttons" id="buttons">
        <div class="action" id="btn-clear-all">AC</div>
        <div class="action" id="btn-clear">C</div>
        <div class="action" id="btn-percentage">%</div>
        <div class="action" id="btn-division">/</div>
        <div id="btn-seven">7</div>
        <div id="btn-eight">8</div>
        <div id="btn-nine">9</div>
        <div class="action" id="btn-mult">X</div>
        <div id="btn-four">4</div>
        <div id="btn-five">5</div>
        <div id="btn-six">6</div>
        <div class="action" id="btn-minus">-</div>
        <div id="btn-one">1</div>
        <div id="btn-two">2</div>
        <div id="btn-three">3</div>
        <div class="action" id="btn-plus">+</div>
        <div id="btn-zero">0</div>
        <div id="btn-comma">,</div>
        <div id="btn-equal">=</div>
      </div>
    </div>
  </body>
</html>
